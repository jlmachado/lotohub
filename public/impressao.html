
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão LotoHub</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: white;
            color: black;
            margin: 0;
            padding: 10px;
            width: 300px; /* Largura padrão para papel térmico 80mm */
        }
        .header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 10px; margin-bottom: 10px; }
        .banca { font-size: 20px; font-weight: bold; margin: 0; }
        .info { font-size: 14px; margin: 5px 0; }
        .highlight { font-weight: bold; text-transform: uppercase; font-size: 16px; margin: 10px 0; display: block; }
        .divider { border-top: 1px dashed black; margin: 10px 0; }
        .section-title { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #333; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 4px 0; font-size: 14px; }
        .col-pos { width: 40px; }
        .col-val { font-weight: bold; }
        .col-price { text-align: right; }

        .footer { text-align: center; margin-top: 20px; font-size: 11px; font-style: italic; border-top: 1px dashed black; padding-top: 10px; }
        
        @media print {
            @page { margin: 0; }
            body { padding: 5px; }
        }
    </style>
</head>
<body>
    <div id="printContent">Carregando dados para impressão...</div>

    <script>
        window.onload = function() {
            const rawData = localStorage.getItem('PRINT_TICKET_DATA');
            if (!rawData) {
                document.getElementById('printContent').innerHTML = 'Erro: Nenhum dado encontrado para imprimir.';
                return;
            }

            const data = JSON.parse(rawData);
            let html = `
                <div class="header">
                    <p class="banca">${data.banca || 'LOTOHUB'}</p>
                    <div class="info">PULE: <b>${data.ticketId}</b></div>
                    <div class="info">${data.datetime}</div>
                </div>

                <div class="section-title">Localização da Extração</div>
                <span class="highlight">${data.jogo}</span>

                <div class="divider"></div>

                <div class="section-title">Palpites Confirmados</div>
                <table>
            `;

            data.apostas.forEach(aposta => {
                html += `
                    <tr>
                        <td class="col-pos">${aposta.modalidade}</td>
                        <td class="col-val">${aposta.numero}</td>
                        <td class="col-price">R$ ${aposta.valor}</td>
                    </tr>
                `;
            });

            html += `
                </table>

                <div class="divider"></div>

                <div style="text-align: right; font-size: 16px; font-weight: bold;">
                    TOTAL: ${data.total}
                </div>
                <div style="text-align: right; font-size: 14px; font-weight: bold; color: #333; margin-top: 5px;">
                    RETORNO POTENCIAL: R$ ${data.possivelRetorno}
                </div>

                <div class="divider"></div>
                <div class="info">Terminal: ${data.terminal}</div>
                <div class="info">Vendedor: ${data.vendedor}</div>

                <div class="footer">
                    Comprovante válido apenas para conferência oficial.<br>
                    Boa sorte e jogue com responsabilidade.
                </div>
            `;

            document.getElementById('printContent').innerHTML = html;
            
            // Dispara impressão automaticamente e fecha janela
            setTimeout(() => {
                window.print();
                setTimeout(() => window.close(), 500);
            }, 500);
        };
    </script>
</body>
</html>
