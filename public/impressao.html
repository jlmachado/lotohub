<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão LotoHub</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: black;
            background: white;
            margin: 0;
            padding: 10px;
            width: 300px; /* Largura padrão POS térmica */
        }
        .ticket {
            width: 100%;
        }
        .header {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .divider {
            border-bottom: 1px dashed #000;
            margin: 10px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
        }
        .value {
            text-align: right;
        }
        .bet-item {
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #eee;
        }
        .centered {
            text-align: center;
        }
        .bold {
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
        }
        .poule {
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0;
            display: block;
            word-break: break-all;
        }
        @media print {
            .no-print { display: none; }
            body { padding: 0; margin: 0; }
        }
    </style>
</head>
<body>
    <div id="print-container">
        <p class="centered">Carregando bilhete...</p>
    </div>

    <script>
        function render() {
            const container = document.getElementById('print-container');
            const rawData = localStorage.getItem('PRINT_TICKET_DATA');
            
            if (!rawData) {
                container.innerHTML = '<p class="centered">Erro: Dados do bilhete não encontrados.</p>';
                return;
            }

            try {
                const data = JSON.parse(rawData);
                
                let html = `
                    <div class="ticket">
                        <div class="header">${data.banca || 'LOTOHUB'}</div>
                        <div class="centered bold">${data.title || 'COMPROVANTE'}</div>
                        <div class="divider"></div>
                        
                        <div class="info-row"><span class="label">Pule:</span></div>
                        <div class="poule centered">${data.ticketId}</div>
                        
                        <div class="info-row"><span class="label">Data:</span><span class="value">${data.datetime}</span></div>
                        <div class="info-row"><span class="label">Estado:</span><span class="value">${data.estado || data.jogo.split('-')[0] || 'Nacional'}</span></div>
                        <div class="info-row"><span class="label">Loteria:</span><span class="value">${data.loteria || data.jogo.split('-')[1] || 'Geral'}</span></div>
                        <div class="info-row"><span class="label">Horário:</span><span class="value">${data.horario || '--:--'}</span></div>
                        
                        <div class="divider"></div>
                        <div class="centered bold">APOSTAS</div>
                        <div class="divider"></div>
                `;

                data.apostas.forEach(aposta => {
                    html += `
                        <div class="bet-item">
                            <div class="info-row"><span class="label">${aposta.modalidade}</span></div>
                            <div class="bold" style="margin: 5px 0;">${aposta.numero}</div>
                            <div class="info-row"><span>Valor:</span><span class="bold">R$ ${aposta.valor}</span></div>
                        </div>
                    `;
                });

                html += `
                        <div class="divider"></div>
                        <div class="info-row"><span class="label">TOTAL APOSTADO:</span><span class="bold">${data.total}</span></div>
                        ${data.possivelRetorno && data.possivelRetorno !== '0,00' ? 
                            `<div class="info-row"><span class="label">RETORNO POSSÍVEL:</span><span class="bold">R$ ${data.possivelRetorno}</span></div>` : ''}
                        
                        <div class="divider"></div>
                        <div class="info-row"><span class="label">Terminal:</span><span class="value">${data.terminal}</span></div>
                        <div class="info-row"><span class="label">Vendedor:</span><span class="value">${data.vendedor}</span></div>
                        
                        <div class="footer">
                            <p>Consulte a validade deste bilhete em: <br><strong>lotohub.com</strong></p>
                            <p>Boa Sorte!</p>
                        </div>
                    </div>
                `;

                container.innerHTML = html;

                // Delay seguro para o Android renderizar o conteúdo antes do preview
                setTimeout(() => {
                    window.print();
                    // window.close(); // Opcional
                }, 800);

            } catch (e) {
                container.innerHTML = '<p class="centered">Erro ao processar dados de impressão.</p>';
                console.error(e);
            }
        }

        window.onload = render;
    </script>
</body>
</html>
