<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão - LotoHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: white;
            color: black;
            font-size: 13px;
            line-height: 1.3;
            padding: 10px;
        }
        .container {
            width: 300px;
            margin: 0 auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .center {
            text-align: center;
        }
        .bold {
            font-weight: bold;
        }
        .divider {
            border-top: 1px dashed black;
            margin: 8px 0;
        }
        .double-divider {
            border-top: 2px solid black;
            margin: 8px 0;
        }
        @media print {
            body { padding: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div id="content" class="container">
        <!-- O conteúdo será injetado via JS -->
        Aguardando dados...
    </div>

    <script>
        function renderContent() {
            const rawData = localStorage.getItem('PRINT_TICKET_DATA');
            if (!rawData) {
                document.getElementById('content').innerHTML = "Erro: Dados não encontrados.";
                return;
            }

            const data = JSON.parse(rawData);
            const contentEl = document.getElementById('content');
            
            let html = "";

            // CABEÇALHO
            html += `<div class="center bold">`;
            html += `${data.banca.toUpperCase()}\n`;
            html += `--------------------------------\n`;
            html += `${data.title}\n`;
            if (data.title === 'RESULTADO OFICIAL') {
                html += `JOGO DO BICHO\n`;
            }
            html += `================================</div>\n\n`;

            if (data.title === 'RESULTADO OFICIAL') {
                // LAYOUT DE RESULTADO PROFISSIONAL
                html += `Estado : ${data.estado || '---'}\n`;
                html += `Loteria: ${data.loteria || '---'}\n`;
                html += `Horário: ${data.horario || '--:--'}\n`;
                const dataFormatada = data.datetime ? data.datetime.split(' ')[0] : '---';
                html += `Data   : ${dataFormatada}\n\n`;

                html += `--------------------------------\n`;
                html += `   CLASSIFICAÇÃO DOS PRÊMIOS\n`;
                html += `--------------------------------\n\n`;

                if (data.apostas && data.apostas.length > 0) {
                    data.apostas.forEach(p => {
                        // Formato: 1º -> 1234 | Gr. 14 - Gato
                        html += `${p.modalidade.padEnd(4)} -> ${p.numero}\n`;
                    });
                }

                if (data.firstPrize) {
                    html += `\n--------------------------------\n`;
                    html += `    DERIVAÇÕES DO 1º PRÊMIO\n\n`;
                    html += `Grupo  : ${data.firstPrize.grupo}\n`;
                    html += `Dezena : ${data.firstPrize.dezena}\n`;
                    html += `Centena: ${data.firstPrize.centena}\n`;
                    html += `Milhar : ${data.firstPrize.milhar}\n`;
                }

            } else {
                // LAYOUT DE BILHETE PADRÃO (FALLBACK)
                html += `Bilhete : ${data.ticketId}\n`;
                html += `Terminal: ${data.terminal}\n`;
                html += `Data    : ${data.datetime}\n`;
                if (data.vendedor) html += `Vendedor: ${data.vendedor}\n`;
                html += `--------------------------------\n\n`;

                html += `<div class="bold">JOGO: ${data.jogo}</div>\n\n`;

                if (data.apostas && data.apostas.length > 0) {
                    data.apostas.forEach((ap, idx) => {
                        html += `[${(idx + 1).toString().padStart(2, '0')}] ${ap.modalidade.padEnd(10)} | ${ap.numero.padEnd(5)} | R$ ${ap.valor}\n`;
                    });
                }

                html += `\n--------------------------------\n`;
                html += `TOTAL APOSTADO: ${data.total}\n`;
                if (data.possivelRetorno && data.possivelRetorno !== '---') {
                    html += `RETORNO POSS.: R$ ${data.possivelRetorno}\n`;
                }
            }

            // RODAPÉ COMUM
            html += `\n--------------------------------\n`;
            html += `<div class="center">Sistema LotoHub\n`;
            html += `Resultado oficial registrado\n`;
            html += `--------------------------------\n\n`;
            html += `BOA SORTE!</div>\n`;
            html += `<div class="center">================================</div>`;

            contentEl.innerHTML = html;

            // Dispara a impressão após renderizar
            setTimeout(() => {
                window.print();
                // Opcional: fechar a janela após imprimir
                // window.close();
            }, 800);
        }

        window.onload = renderContent;
    </script>
</body>
</html>
