<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Clone Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <div class="header">
            <img src="images/fortune-tiger.png" alt="Fortune Tiger Logo" class="logo">
        </div>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="reels" id="reels">
                    <div class="reel" id="reel1"></div>
                    <div class="reel" id="reel2"></div>
                    <div class="reel" id="reel3"></div>
                </div>
                <!-- Linhas de Pagamento Visuais -->
                <div class="paylines"></div>
            </div>
        </div>

        <div class="controls">
            <div class="balance-info">
                <span class="label">SALDO</span>
                <span id="display-balance" class="value">R$ 0,00</span>
            </div>
            
            <div class="bet-controls">
                <button class="bet-btn" onclick="adjustBet(-1)">-</button>
                <div class="bet-value">
                    <span class="label">APOSTA</span>
                    <span id="display-bet" class="value">R$ 1,00</span>
                </div>
                <button class="bet-btn" onclick="adjustBet(1)">+</button>
            </div>

            <button id="spin-button" class="spin-button">
                <img src="images/moedas.png" alt="Spin" class="spin-icon">
            </button>
        </div>

        <div id="win-overlay" class="win-overlay hidden">
            <div class="win-content">
                <img src="images/fogos.png" alt="Win" class="win-bg">
                <h2 id="win-text">BIG WIN!</h2>
                <span id="win-amount">R$ 0,00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
