<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <div class="tiger-spinner"></div>
            <p id="loader-text">CARREGANDO ASSETS...</p>
        </div>
    </div>

    <div id="game-container" class="game-wrapper" style="opacity: 0;">
        <header class="game-header">
            <div class="logo-container">
                <img src="images/logo.png" alt="Fortune Tiger" class="game-logo">
            </div>
        </header>

        <main class="game-main">
            <div class="tiger-mascot-container">
                <img src="images/tiger.png" alt="Tiger" class="tiger-mascot">
            </div>

            <div class="reels-section">
                <div id="reels-container" class="reels-grid">
                    <!-- Reels via JS -->
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <div class="display-row">
                <div class="display-item">
                    <span class="label">SALDO</span>
                    <span id="balance-display" class="value">R$ 0,00</span>
                </div>
                <div class="display-item highlight">
                    <span class="label">GANHO</span>
                    <span id="win-display" class="value">R$ 0,00</span>
                </div>
                <div class="display-item">
                    <span class="label">APOSTA</span>
                    <span id="bet-display" class="value">R$ 1,00</span>
                </div>
            </div>

            <div class="controls-row">
                <button id="minus-btn" class="control-btn">−</</button>
                <div class="spin-wrapper">
                    <button id="spin-btn" class="spin-button">
                        <img src="images/spin_btn.png" alt="SPIN">
                    </button>
                </div>
                <button id="plus-btn" class="control-btn">+</button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
