<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Clone Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="tiger-header">
            <img src="images/tiger.png" alt="Tiger" id="tiger-anim">
        </div>

        <div id="slot-container">
            <div class="slot-grid">
                <div class="reel" id="reel-1"></div>
                <div class="reel" id="reel-2"></div>
                <div class="reel" id="reel-3"></div>
            </div>
            <div id="win-overlay" class="hidden">
                <div class="win-message">BIG WIN!</div>
                <div class="win-amount">R$ 0,00</div>
            </div>
        </div>

        <div id="controls">
            <div class="hud-top">
                <div class="balance-box">
                    <span class="label">SALDO</span>
                    <span id="balance-value">R$ 0,00</span>
                </div>
                <div class="win-box">
                    <span class="label">GANHO</span>
                    <span id="last-win-value">R$ 0,00</span>
                </div>
            </div>

            <div class="bet-controls">
                <button id="btn-minus">-</button>
                <div class="bet-value">
                    <span class="label">APOSTA</span>
                    <span id="current-bet">R$ 1,00</span>
                </div>
                <button id="btn-plus">+</button>
            </div>

            <div class="main-actions">
                <button id="btn-auto">AUTO</button>
                <button id="btn-spin" class="lux-shine"></button>
                <button id="btn-turbo">TURBO</button>
            </div>
        </div>
    </div>

    <!-- Scripts de Audio e Lógica -->
    <script src="script.js"></script>
</body>
</html>
