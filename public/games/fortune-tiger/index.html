<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <!-- Background Decor -->
        <div class="bg-decoration"></div>

        <!-- Main Header -->
        <header id="game-header">
            <div class="logo-container">
                <div class="tiger-head"></div>
                <h1>FORTUNE TIGER</h1>
            </div>
        </header>

        <!-- Jackpot Display -->
        <div id="jackpot-container">
            <span class="label">JACKPOT</span>
            <span id="jackpot-value">R$ 12.450,00</span>
        </div>

        <!-- Reels Container -->
        <div id="reels-wrapper">
            <div class="reel" id="reel-1">
                <div class="reel-strip"></div>
            </div>
            <div class="reel" id="reel-2">
                <div class="reel-strip"></div>
            </div>
            <div class="reel" id="reel-3">
                <div class="reel-strip"></div>
            </div>
            <!-- Winning Lines Overlay -->
            <div id="win-lines"></div>
        </div>

        <!-- Game Controls -->
        <footer id="game-controls">
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">GANHO</span>
                    <span id="win-amount">R$ 0,00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">APOSTA</span>
                    <span id="bet-amount">R$ 1,00</span>
                </div>
            </div>

            <div class="main-buttons">
                <button id="btn-minus" class="control-btn">-</button>
                <div class="spin-btn-wrapper">
                    <button id="btn-spin" class="spin-btn">SPIN</button>
                </div>
                <button id="btn-plus" class="control-btn">+</button>
            </div>

            <div class="auto-turbo-bar">
                <button id="btn-auto" class="toggle-btn">AUTO</button>
                <button id="btn-turbo" class="toggle-btn">TURBO</button>
            </div>
        </footer>

        <!-- Win Overlays -->
        <div id="big-win-overlay" class="overlay hidden">
            <div class="win-content">
                <h2 class="animate-pulse">BIG WIN!</h2>
                <p id="big-win-value">R$ 0,00</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
