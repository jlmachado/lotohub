<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Overlay de Carregamento -->
    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <div class="tiger-spinner"></div>
            <p id="loader-text">CARREGANDO ASSETS...</p>
        </div>
    </div>

    <!-- Container Principal do Jogo -->
    <div id="game-container" class="game-container hidden" style="opacity: 0;">
        <header class="game-header">
            <img src="images/logo.png" alt="Fortune Tiger" class="game-logo">
        </header>

        <main class="reels-section">
            <div class="reels-wrapper">
                <div id="reels-container" class="reels-container">
                    <!-- Bobinas geradas via JS -->
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <div class="info-bar">
                <div class="info-item">
                    <span>SALDO</span>
                    <span id="balance-display">R$ 0,00</span>
                </div>
                <div class="info-item">
                    <span>APOSTA</span>
                    <span id="bet-display">R$ 1,00</span>
                </div>
            </div>

            <div class="controls-row">
                <button id="minus-btn" class="control-btn">-</button>
                <div id="spin-btn-wrapper">
                    <button id="spin-btn" class="spin-button">
                        <img src="images/spin_btn.png" alt="SPIN">
                    </button>
                </div>
                <button id="plus-btn" class="control-btn">+</button>
            </div>
        </footer >
    </div>

    <script src="script.js"></script>
</body>
</html>
