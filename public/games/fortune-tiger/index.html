
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <div class="tiger-spinner"></div>
            <p id="loader-text">CARREGANDO ASSETS...</p>
        </div>
    </div>

    <div id="game-container" class="game-wrapper">
        <header class="game-header">
            <img src="images/logo.png" alt="Fortune Tiger" class="game-logo">
        </header>

        <main class="reels-section">
            <div class="reels-container" id="reels-container">
                <div class="reel" id="reel-0"></div>
                <div class="reel" id="reel-1"></div>
                <div class="reel" id="reel-2"></div>
            </div>
            <div class="tiger-decoration">
                <img src="images/tiger.png" alt="" class="tiger-mascot">
            </div>
        </main>

        <footer class="game-footer">
            <div class="stats-row">
                <div class="stat-box">
                    <span>SALDO</span>
                    <span id="balance-display">R$ 0,00</span>
                </div>
                <div class="stat-box">
                    <span>GANHO</span>
                    <span id="win-display">R$ 0,00</span>
                </div>
            </div>

            <div class="controls-row">
                <div class="bet-controls">
                    <button id="bet-minus" class="btn-adjust">-</button>
                    <div class="bet-value">
                        <span class="label">APOSTA</span>
                        <span id="bet-display">R$ 1,00</span>
                    </div>
                    <button id="bet-plus" class="btn-adjust">+</button>
                </div>
                
                <button id="spin-btn" class="spin-button">
                    <img src="images/spin_btn.png" alt="Girar">
                </button>

                <div class="auto-spin">
                    <button id="auto-btn" class="btn-secondary">AUTO</button>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
