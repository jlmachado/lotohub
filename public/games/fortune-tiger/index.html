<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div class="header">
            <div class="logo-container">
                <img src="images/logo.png" alt="Fortune Tiger" class="game-logo" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="reels-container">
            <div class="grid-overlay"></div>
            <div class="reels">
                <div class="reel" id="reel-0">
                    <div class="reel-content"></div>
                </div>
                <div class="reel" id="reel-1">
                    <div class="reel-content"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-content"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="info-bar">
                <div class="balance-container">
                    <span class="label">SALDO</span>
                    <span class="value" id="balance">R$ 1.000,00</span>
                </div>
                <div class="win-container">
                    <span class="label">GANHO</span>
                    <span class="value" id="last-win">R$ 0,00</span>
                </div>
            </div>

            <div class="action-buttons">
                <div class="bet-adjust">
                    <button class="btn-adjust" id="btn-minus">-</button>
                    <div class="current-bet">
                        <span class="bet-label">APOSTA</span>
                        <span class="bet-value" id="bet-amount">R$ 1,00</span>
                    </div>
                    <button class="btn-adjust" id="btn-plus">+</button>
                </div>

                <div class="spin-container">
                    <button id="spin-button" class="btn-spin">
                        <div class="spin-icon"></div>
                    </button>
                </div>

                <div class="turbo-auto">
                    <button class="btn-util" id="btn-turbo">
                        <span class="icon">⚡</span>
                        <span class="text">TURBO</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Popups -->
        <div id="win-popup" class="popup hidden">
            <div class="popup-content">
                <h2 id="win-title">BIG WIN!</h2>
                <p id="win-value">R$ 50,00</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
