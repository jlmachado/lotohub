<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- Background e Logo -->
        <div class="game-bg"></div>
        <div class="game-header">
            <div class="tiger-logo"></div>
        </div>

        <!-- Reels Container -->
        <div class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel-0"></div>
                <div class="reel" id="reel-1"></div>
                <div class="reel" id="reel-2"></div>
                <!-- Win Line Overlays -->
                <div class="win-lines" id="win-lines"></div>
            </div>
        </div>

        <!-- HUD & Controls -->
        <div class="game-footer">
            <div class="info-bar">
                <div class="info-item">
                    <span>SALDO</span>
                    <p id="balance-display">R$ 0,00</p>
                </div>
                <div class="info-item">
                    <span>GANHO</span>
                    <p id="win-display">R$ 0,00</p>
                </div>
            </div>

            <div class="controls">
                <div class="bet-control">
                    <button id="btn-minus" class="ctrl-btn">-</button>
                    <div class="bet-value">
                        <span>APOSTA</span>
                        <p id="bet-display">R$ 1,00</p>
                    </div>
                    <button id="btn-plus" class="ctrl-btn">+</button>
                </div>

                <button id="spin-btn" class="spin-btn">
                    <div class="spin-icon"></div>
                </button>

                <div class="auto-turbo">
                    <button id="turbo-btn" class="sub-btn">TURBO</button>
                    <button id="auto-btn" class="sub-btn">AUTO</button>
                </div>
            </div>
        </div>

        <!-- Popups -->
        <div id="big-win-overlay" class="overlay hidden">
            <div class="big-win-content">
                <h2 class="animate-bounce">BIG WIN!</h2>
                <p id="big-win-value">R$ 0,00</p>
            </div>
        </div>
    </div>

    <!-- Audio (Preload) -->
    <audio id="audio-spin" src="media/spin.mp3" preload="auto"></audio>
    <audio id="audio-win" src="media/win.mp3" preload="auto"></audio>
    <audio id="audio-bg" src="media/bg.mp3" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
