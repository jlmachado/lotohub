<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Overlay de Carregamento -->
    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <div class="tiger-spinner"></div>
            <p id="loader-text">CARREGANDO ASSETS...</p>
        </div>
    </div>

    <!-- Container Principal do Jogo -->
    <div id="game-container" style="opacity: 0;">
        <header class="game-header">
            <div class="logo-area">
                <img src="images/logo.png" alt="Fortune Tiger Logo" class="game-logo">
            </div>
            <div class="tiger-mascot">
                <img src="images/tiger.png" alt="Tiger" class="tiger-img">
            </div>
        </header>

        <main class="game-viewport">
            <div class="reels-frame">
                <div id="reels-container" class="reels-container">
                    <!-- Bobinas geradas via JS -->
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <div class="info-bar">
                <div class="info-item">
                    <span>SALDO</span>
                    <p id="balance-display">R$ 0,00</p>
                </div>
                <div class="info-item">
                    <span>APOSTA</span>
                    <p id="bet-display">R$ 1,00</p>
                </div>
                <div class="info-item">
                    <span>GANHO</span>
                    <p id="win-display">R$ 0,00</p>
                </div>
            </div>

            <div class="controls-area">
                <button id="minus-btn" class="control-btn">-</button>
                <div id="spin-wrapper">
                    <button id="spin-btn" class="spin-button">
                        <img src="images/spin_btn.png" alt="Girar">
                    </button>
                </div>
                <button id="plus-btn" class="control-btn">+</button>
            </div>
        </footer>
    </div>

    <!-- Overlay de Vitória -->
    <div id="win-overlay" class="win-overlay hidden">
        <div class="win-content">
            <h2 id="win-title">BIG WIN!</h2>
            <p id="win-amount">R$ 0,00</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
